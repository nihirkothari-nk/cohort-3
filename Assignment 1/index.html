<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokeVerse - Explore Your Favorite Pokémon</title>
    <meta name="description" content="PokeVerse is a Pokémon-themed web page built using HTML and CSS. Explore Pokémon cards, search your favorite characters, and enjoy a clean modern UI design.">
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
      <link rel="icon" type="image/png" href="./pokeball.png">
  </head>
  <body>
    <div id="container">
      <div id="nav">
        <img id="menubar" src="./images.png" alt="" />
        <img id="pokelogo" src="./pngegg.png" alt="image not found" />
        <div id="nightmode">
          <img id="sun" src="./sun.png" alt="" />
        </div>
      </div>

      <div id="header">
        <input type="text"placeholder="Search for pokemone..."id="inputpoke"/>
        <div id="right">
          <select name="Filter " id="Filter">
            <option>Filter by types(1)</option>
          </select>
          <img src="./sort button.png" alt="not found" id="sortbutton" />
        </div>

      </div>
      <br><br>

      <div id="mainbody">
        <div class="all" id="card1">
          <div id="top"><p id="code">#0906</p> <img id="heart" src="./heart button.png" alt=""> </div> <br>
          <img id="mew" src="./mewtow.png" alt=""><br>
          <h1>Mewtow</h1>
          <div id="bottom">
              <div class="attack">
                <img id="mewatk" src="./energymew.png"alt="">
                <p id="atk_nme">Psychic</p>
              </div>
              <img  id="arrow" src="./arrow.png" alt="">
          </div>
        </div>
        <div class="all" id="card2">
          <div id="top"><p id="code">#0907</p> <img id="heart" src="./heart button.png" alt=""> </div> <br>
          <img id="pika" src="./pikachu (1).png" alt=""><br><br>
          <h1>Pikachu</h1>
          <div id="bottom">
              <div class="attack2">
                <img id="mewatk" src="./pika atk.png"alt="">
                <p id="atk_nme">Electro</p>
              </div>
              <img  id="arrow" src="./arrow.png" alt="">
          </div> 
        </div>
        <div class="all" id="card3">
          <div id="top"><p id="code">#0909</p> <img id="heart" src="./heart button.png" alt=""> </div> <br>
          <img id="chari" src="./charizard.png" alt=""><br><br><br><br>
          <h1>Charizard</h1> 
          <div id="bottom">
              <div class="attack3">
                <img id="mewatk" src="./fire logo.png"alt="">
                <p id="atk_nme">Blaze</p>
              </div>
              <img  id="arrow" src="./arrow.png" alt="">
          </div>
          </div>
          <div class="all" id="card4">
            <div id="top"><p id="code">#0910</p> <img id="heart" src="./heart button.png" alt=""> </div> <br>
          <img id="gly" src="./gly.png" alt=""><br><br><br><br>
          <h1>Gyrados</h1>
          <div id="bottom">
              <div class="attack4">
                <img id="mewatk" src="./splash.png"alt="">
                <p id="atk_nme">Splash</p>
              </div>
              <img  id="arrow" src="./arrow.png" alt="">
          </div>
          </div>
        </div>   
        </div>
    </div>
  </body> 
</html>
